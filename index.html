<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What do we do on a first date?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>What do we do on a first date?</h1>
    <p class="intro">Let's find out what kind of first date would suit us best ✨</p>

    <div class="card">
      <h2>Choose a vibe</h2>
      <div class="buttons">
        <button onclick="showResult('Coffee and good conversation ☕')">Coffee</button>
        <button onclick="showResult('A relaxed walk together 🚶')">Walk</button>
        <button onclick="showResult('Something fun and spontaneous 🎉')">Something fun</button>
      </div>
    </div>

    <div id="result" class="result hidden"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
