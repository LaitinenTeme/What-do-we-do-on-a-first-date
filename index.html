<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Pages Test</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #dff1ff, #ffd1e8);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111;
    }

    .step {
      display: none;
      width: 90%;
      max-width: 600px;
    }

    .step.active {
      display: block;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 24px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.12);
    }

    button {
      margin-top: 20px;
      padding: 14px 18px;
      border: none;
      border-radius: 14px;
      background: #1f6feb;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <main>
    <section class="step active" id="step1">
      <div class="card">
        <h1>VERSIO TESTI 001</h1>
        <p>Jos näet tämän, GitHub Pages käyttää nyt oikeaa index.html-tiedostoa.</p>
        <button id="nextBtn">Jatka step 2</button>
      </div>
    </section>

    <section class="step" id="step2">
      <div class="card">
        <h1>Step 2 toimii</h1>
        <p>Jos pääsit tähän, JavaScript toimii.</p>
      </div>
    </section>
  </main>

  <script>
    document.getElementById("nextBtn").addEventListener("click", function () {
      document.getElementById("step1").classList.remove("active");
      document.getElementById("step2").classList.add("active");
    });
  </script>
</body>
</html>
